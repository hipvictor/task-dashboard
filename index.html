<!DOCTYPE html>
<html lang="en" data-theme="ember">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Libre+Baskerville:wght@400;700&family=Source+Serif+4:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #1a1816;
      --surface: #242220;
      --surface-hover: #2e2b28;
      --border: #3a3632;
      --text: #e8e4df;
      --text-muted: #9a9490;
      --accent: #c4956a;
      --accent-hover: #d4a57a;
      --danger: #d9534f;
      --warning: #e8a838;
      --success: #5cb85c;
      --purple: #a68bc1;
      --shadow: rgba(0, 0, 0, 0.3);
      --font: 'Inter', -apple-system, system-ui, sans-serif;
    }

    [data-theme="stone"] {
      --bg: #1c1d1f;
      --surface: #26272a;
      --surface-hover: #303235;
      --border: #383a3e;
      --text: #e0e0e0;
      --text-muted: #888888;
      --accent: #8da4bf;
      --accent-hover: #9bb3ce;
      --danger: #d9534f;
      --warning: #e8a838;
      --success: #5cb85c;
      --purple: #9896b9;
      --shadow: rgba(0, 0, 0, 0.35);
    }

    [data-theme="forest"] {
      --bg: #161c18;
      --surface: #1e2620;
      --surface-hover: #26322a;
      --border: #2e3a30;
      --text: #dce4df;
      --text-muted: #8fa090;
      --accent: #7db88a;
      --accent-hover: #8dc999;
      --danger: #d9534f;
      --warning: #e8a838;
      --success: #5cb85c;
      --purple: #95b89f;
      --shadow: rgba(0, 0, 0, 0.35);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }

    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
      background: linear-gradient(135deg, var(--bg) 0%, var(--surface) 100%);
    }

    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 2px 8px var(--shadow);
    }

    .login-box h1 {
      font-size: 1.25rem;
      margin-bottom: 1.5rem;
      text-align: center;
      font-weight: 700;
    }

    .login-box input {
      width: 100%;
      padding: 0.625rem 0.75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.875rem;
      font-family: var(--font);
      margin-bottom: 0.75rem;
      transition: border-color 0.2s ease;
    }

    .login-box input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .login-box button {
      width: 100%;
      padding: 0.625rem;
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: transform 0.2s ease;
    }

    .login-box button:hover {
      transform: translateY(-1px);
    }

    .login-error {
      color: var(--danger);
      font-size: 0.8rem;
      text-align: center;
      margin-top: 0.5rem;
      min-height: 1.2rem;
    }

    #dashboard { display: none; }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .header h1 {
      font-size: 1.125rem;
      font-weight: 700;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .header-date {
      color: var(--text-muted);
      font-size: 0.875rem;
      font-weight: 500;
    }

    .theme-picker {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .theme-btn {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid var(--border);
      cursor: pointer;
      transition: all 0.2s ease;
      background: var(--surface);
    }

    .theme-btn:hover {
      border-color: var(--accent);
      transform: scale(1.1);
    }

    .theme-btn.ember { background: linear-gradient(135deg, #1a1816, #c4956a); }
    .theme-btn.stone { background: linear-gradient(135deg, #1c1d1f, #8da4bf); }
    .theme-btn.forest { background: linear-gradient(135deg, #161c18, #7db88a); }

    .theme-btn.active {
      border-color: var(--accent);
      box-shadow: 0 0 6px rgba(196, 149, 106, 0.4);
    }

    /* ── Settings Dropdown ── */
    .settings-wrap {
      position: relative;
    }

    .settings-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.375rem 0.625rem;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .settings-btn:hover { border-color: var(--text-muted); color: var(--text); }

    .settings-dropdown {
      display: none;
      position: absolute;
      right: 0;
      top: calc(100% + 6px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.875rem;
      z-index: 200;
      min-width: 200px;
      box-shadow: 0 8px 24px var(--shadow);
    }

    .settings-dropdown.open { display: block; }

    .settings-label {
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .settings-label:not(:first-child) { margin-top: 0.875rem; }

    .font-options {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .font-option {
      background: none;
      border: 1px solid transparent;
      color: var(--text-muted);
      padding: 0.375rem 0.5rem;
      border-radius: 6px;
      font-size: 0.8125rem;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s ease;
    }

    .font-option:hover { background: var(--surface-hover); color: var(--text); }
    .font-option.active { border-color: var(--accent); color: var(--accent); background: var(--surface-hover); }

    .btn-logout {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.375rem 0.75rem;
      border-radius: 6px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s ease;
      font-weight: 500;
    }

    .btn-logout:hover {
      border-color: var(--text-muted);
      color: var(--text);
      background: var(--surface-hover);
    }

    .main {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 0;
      max-width: 1200px;
      margin: 0 auto;
      min-height: calc(100vh - 57px);
    }

    .left-col {
      padding: 1.25rem;
      border-right: 1px solid var(--border);
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .left-col-content {
      flex: 1;
      overflow-y: auto;
    }

    .left-col-bottom {
      margin-top: auto;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
    }

    .right-col {
      padding: 1.25rem;
      overflow-y: auto;
    }

    .alerts-bar {
      margin-bottom: 1.25rem;
    }

    .alert {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.625rem 0.875rem;
      border-radius: 12px;
      font-size: 0.8125rem;
      margin-bottom: 0.5rem;
      transition: all 0.3s ease;
    }

    .alert-dismiss {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.875rem;
      padding: 0 0.25rem;
      opacity: 0.5;
      transition: opacity 0.2s ease;
      flex-shrink: 0;
    }

    .alert-dismiss:hover {
      opacity: 1;
    }

    .alert.dismissing {
      opacity: 0;
      transform: translateX(20px);
      max-height: 0;
      padding: 0 0.875rem;
      margin-bottom: 0;
      overflow: hidden;
    }

    .alert-overdue {
      background: rgba(217, 83, 79, 0.15);
      border: 1px solid rgba(217, 83, 79, 0.3);
    }

    .alert-due-soon {
      background: rgba(232, 168, 56, 0.15);
      border: 1px solid rgba(232, 168, 56, 0.3);
    }

    .alert-surfaced {
      background: rgba(196, 149, 106, 0.15);
      border: 1px solid rgba(196, 149, 106, 0.3);
    }

    .section {
      margin-bottom: 1.5rem;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    .section-title {
      font-size: 0.8125rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }

    .section-count {
      font-size: 0.75rem;
      color: var(--text-muted);
      background: var(--surface);
      padding: 0.125rem 0.5rem;
      border-radius: 10px;
    }

    .task {
      display: flex;
      align-items: flex-start;
      gap: 0.625rem;
      padding: 0.625rem 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 0.375rem;
      transition: all 0.2s ease;
      box-shadow: 0 1px 3px var(--shadow);
      position: relative;
    }

    .task:hover {
      background: var(--surface-hover);
      border-color: var(--border);
    }

    .drag-handle {
      display: flex;
      align-items: center;
      cursor: grab;
      color: transparent;
      transition: color 0.2s ease;
      flex-shrink: 0;
      margin-top: 2px;
      font-size: 0.75rem;
      user-select: none;
      padding: 0 2px;
      letter-spacing: 1px;
    }

    .task:hover .drag-handle {
      color: var(--text-muted);
    }

    .drag-handle:active {
      cursor: grabbing;
    }

    .task.dragging {
      opacity: 0.4;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(196, 149, 106, 0.2);
    }

    .drop-zone {
      transition: all 0.2s ease;
      min-height: 4px;
    }

    .drop-zone.drag-over {
      background: rgba(196, 149, 106, 0.08);
      border: 2px dashed var(--accent);
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 0.375rem;
    }

    .drop-zone.drag-over::before {
      content: attr(data-pool-label);
      display: block;
      text-align: center;
      color: var(--accent);
      font-size: 0.75rem;
      font-weight: 600;
      opacity: 0.8;
    }

    .task-checkbox {
      width: 18px;
      height: 18px;
      border: 2px solid var(--text-muted);
      border-radius: 50%;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 2px;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .task-checkbox:hover {
      border-color: var(--success);
      box-shadow: 0 0 4px rgba(92, 184, 92, 0.3);
    }

    .task-checkbox.checked {
      background: var(--success);
      border-color: var(--success);
    }

    .task-checkbox.checked::after {
      content: '✓';
      color: white;
      font-size: 11px;
      font-weight: bold;
    }

    .task-content {
      flex: 1;
      min-width: 0;
    }

    .task-name {
      font-size: 0.875rem;
      font-weight: 500;
    }

    .task-name.completed {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .task-meta {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.25rem;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 0.6875rem;
      padding: 0.0625rem 0.375rem;
      border-radius: 4px;
      background: rgba(196, 149, 106, 0.15);
      color: var(--accent);
    }

    .tag.project {
      background: rgba(166, 139, 193, 0.15);
      color: var(--purple);
    }

    .tag.home {
      background: rgba(92, 184, 92, 0.15);
      color: var(--success);
    }

    .tag.due {
      background: rgba(232, 168, 56, 0.15);
      color: var(--warning);
    }

    .tag.overdue {
      background: rgba(217, 83, 79, 0.15);
      color: var(--danger);
    }

    .task-actions {
      display: flex;
      gap: 0.25rem;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .task:hover .task-actions {
      opacity: 1;
    }

    .task-action-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0.25rem;
      font-size: 0.75rem;
      border-radius: 4px;
      transition: all 0.2s ease;
    }

    .task-action-btn:hover {
      background: var(--surface-hover);
      color: var(--text);
    }

    .collapsible-header {
      cursor: pointer;
      user-select: none;
    }

    .collapsible-header .arrow {
      display: inline-block;
      transition: transform 0.2s ease;
      margin-right: 0.25rem;
      font-size: 0.75rem;
    }

    .collapsible-header.open .arrow {
      transform: rotate(90deg);
    }

    .collapsible-body {
      display: none;
    }

    .collapsible-body.open {
      display: block;
    }

    .quick-add {
      display: flex;
      gap: 0.5rem;
    }

    .quick-add input {
      flex: 1;
      padding: 0.625rem 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.875rem;
      font-family: var(--font);
      transition: all 0.2s ease;
    }

    .quick-add input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .quick-add select {
      padding: 0.625rem 0.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.8125rem;
      font-family: var(--font);
      transition: all 0.2s ease;
    }

    .quick-add select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .quick-add button {
      padding: 0.625rem 1rem;
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.8125rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s ease;
    }

    .quick-add button:hover {
      transform: translateY(-1px);
    }

    .right-section {
      margin-bottom: 1.5rem;
    }

    .right-section-title {
      font-size: 0.8125rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }

    .goal-item {
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.8125rem;
    }

    .goal-item:last-child {
      border-bottom: none;
    }

    .goal-label {
      font-weight: 600;
      color: var(--accent);
    }

    .agenda-scroll {
      max-height: 320px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .agenda-day-label {
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--accent);
      margin-bottom: 0.5rem;
      margin-top: 0.75rem;
      position: sticky;
      top: 0;
      background: var(--bg);
      padding: 0.25rem 0;
      z-index: 2;
    }

    .agenda-day-label:first-child {
      margin-top: 0;
    }

    .agenda-event {
      display: flex;
      gap: 0.625rem;
      padding: 0.5rem 0;
      border-left: 2px solid var(--border);
      margin-left: 4px;
      padding-left: 0.75rem;
      font-size: 0.8125rem;
      align-items: flex-start;
      transition: all 0.2s ease;
    }

    .agenda-event.past {
      opacity: 0.45;
      border-left-color: var(--border);
    }

    .agenda-event.current {
      border-left: 3px solid var(--accent);
      padding-left: calc(0.75rem - 1px);
      background: rgba(196, 149, 106, 0.08);
      border-radius: 4px;
      padding: 0.5rem 0.75rem;
      margin: 0.25rem 0;
    }

    .agenda-event.upcoming {
      border-left-color: var(--text-muted);
    }

    .agenda-now-marker {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-left: 4px;
      padding: 0.25rem 0;
      position: relative;
    }

    .agenda-now-marker::before {
      content: '';
      width: 8px;
      height: 8px;
      background: var(--danger);
      border-radius: 50%;
      flex-shrink: 0;
      margin-left: -5px;
      box-shadow: 0 0 4px var(--danger);
    }

    .agenda-now-marker::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--danger);
      opacity: 0.5;
    }

    .agenda-now-time {
      font-size: 0.6875rem;
      color: var(--danger);
      font-weight: 600;
      white-space: nowrap;
    }

    .agenda-time {
      color: var(--text-muted);
      font-size: 0.75rem;
      min-width: 52px;
      flex-shrink: 0;
      padding-top: 1px;
    }

    .agenda-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 6px;
    }

    .agenda-summary {
      flex: 1;
      min-width: 0;
    }

    .agenda-summary .event-title {
      font-weight: 500;
      color: var(--text);
    }

    .agenda-event.past .event-title {
      color: var(--text-muted);
    }

    .agenda-summary .event-location {
      font-size: 0.6875rem;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .agenda-empty {
      color: var(--text-muted);
      font-size: 0.8125rem;
      font-style: italic;
      padding: 0.5rem 0;
    }

    .coaching-card {
      background: linear-gradient(135deg, rgba(196, 149, 106, 0.08), rgba(166, 139, 193, 0.08));
      border: 1px solid rgba(196, 149, 106, 0.12);
      border-radius: 10px;
      padding: 0.875rem 1rem;
      box-shadow: 0 1px 3px var(--shadow);
    }

    .coaching-text {
      font-size: 0.8125rem;
      line-height: 1.55;
      color: var(--text-muted);
      font-style: italic;
      font-weight: 300;
    }

    .coaching-source {
      font-size: 0.6875rem;
      color: rgba(154, 148, 144, 0.6);
      margin-top: 0.5rem;
    }

    .move-menu {
      position: absolute;
      right: 0;
      top: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.25rem;
      z-index: 100;
      min-width: 140px;
      box-shadow: 0 4px 12px var(--shadow);
    }

    .move-menu button {
      display: block;
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      color: var(--text);
      padding: 0.375rem 0.625rem;
      font-size: 0.8125rem;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s ease;
      font-family: var(--font);
    }

    .move-menu button:hover {
      background: var(--surface-hover);
    }

    .task-actions-wrap {
      position: relative;
    }

    /* — Select mode — */
    .select-toggle {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.3rem 0.7rem;
      border-radius: 6px;
      font-size: 0.75rem;
      cursor: pointer;
      font-family: var(--font);
      transition: all 0.15s ease;
    }

    .select-toggle:hover {
      color: var(--text);
      border-color: var(--accent);
    }

    .select-toggle.active {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
      font-weight: 500;
    }

    body.select-mode .task {
      cursor: pointer;
    }

    body.select-mode .task .task-checkbox,
    body.select-mode .task .task-actions-wrap,
    body.select-mode .task .drag-handle {
      display: none;
    }

    .task.selected {
      outline: 2px solid var(--accent);
      outline-offset: -2px;
      background: color-mix(in srgb, var(--accent) 8%, var(--surface));
    }

    .batch-bar {
      display: none;
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.5rem 0.75rem;
      z-index: 500;
      box-shadow: 0 8px 24px var(--shadow);
      align-items: center;
      gap: 0.5rem;
    }

    .batch-bar.active {
      display: flex;
    }

    .batch-bar .batch-count {
      font-size: 0.8125rem;
      color: var(--accent);
      font-weight: 600;
      white-space: nowrap;
      padding-right: 0.5rem;
      border-right: 1px solid var(--border);
      margin-right: 0.25rem;
    }

    .batch-bar button {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.35rem 0.6rem;
      border-radius: 6px;
      font-size: 0.75rem;
      cursor: pointer;
      font-family: var(--font);
      transition: all 0.15s ease;
      white-space: nowrap;
    }

    .batch-bar button:hover {
      background: var(--surface-hover);
      border-color: var(--accent);
    }

    .batch-bar button.batch-done {
      background: var(--success);
      color: #fff;
      border-color: var(--success);
    }

    .batch-bar button.batch-cancel {
      color: var(--text-muted);
    }

    .defer-modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 999;
      align-items: center;
      justify-content: center;
    }

    .defer-modal-overlay.active {
      display: flex;
    }

    .defer-modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      width: 280px;
      box-shadow: 0 8px 24px var(--shadow);
    }

    .defer-modal h3 {
      font-size: 0.9375rem;
      margin-bottom: 0.75rem;
      color: var(--text);
    }

    .defer-modal .defer-shortcuts {
      display: flex;
      flex-wrap: wrap;
      gap: 0.375rem;
      margin-bottom: 0.75rem;
    }

    .defer-modal .defer-shortcuts button {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 0.3rem 0.6rem;
      border-radius: 6px;
      font-size: 0.75rem;
      cursor: pointer;
      font-family: var(--font);
      transition: all 0.15s ease;
    }

    .defer-modal .defer-shortcuts button:hover {
      background: var(--surface-hover);
      color: var(--text);
      border-color: var(--accent);
    }

    .defer-modal input[type="date"] {
      width: 100%;
      padding: 0.5rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.875rem;
      margin-bottom: 0.75rem;
    }

    .defer-modal .defer-actions {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
    }

    .defer-modal .defer-actions button {
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      font-size: 0.8125rem;
      cursor: pointer;
      font-family: var(--font);
      border: 1px solid var(--border);
      transition: all 0.15s ease;
    }

    .defer-modal .defer-actions .cancel-btn {
      background: var(--bg);
      color: var(--text-muted);
    }

    .defer-modal .defer-actions .confirm-btn {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
      font-weight: 500;
    }

    .defer-modal .defer-actions button:hover {
      opacity: 0.85;
    }

    .defer-date-badge {
      font-size: 0.6875rem;
      color: var(--accent);
      margin-left: 0.25rem;
      opacity: 0.8;
    }

    .filter-bar {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .filter-bar select {
      padding: 0.375rem 0.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      font-size: 0.75rem;
      font-family: var(--font);
      transition: all 0.2s ease;
    }

    .filter-bar select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .loading {
      text-align: center;
      color: var(--text-muted);
      padding: 2rem;
      font-size: 0.875rem;
    }

    @media (max-width: 768px) {
      .main {
        grid-template-columns: 1fr;
      }

      .left-col {
        border-right: none;
        border-bottom: 1px solid var(--border);
      }

      .theme-picker {
        display: none;
      }
    }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h1>Task Dashboard</h1>
    <input type="email" id="login-email" placeholder="Email" autocomplete="email">
    <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
    <button onclick="handleLogin()">Sign In</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div id="dashboard">
  <div class="header">
    <h1>Task Dashboard</h1>
    <div class="header-right">
      <div class="header-date" id="header-date"></div>
      <div class="theme-picker">
        <button class="theme-btn ember active" onclick="setTheme('ember')" title="Ember"></button>
        <button class="theme-btn stone" onclick="setTheme('stone')" title="Stone"></button>
        <button class="theme-btn forest" onclick="setTheme('forest')" title="Forest"></button>
      </div>
      <div class="settings-wrap">
        <button class="settings-btn" onclick="toggleSettings(event)">Aa</button>
        <div class="settings-dropdown" id="settings-dropdown">
          <div class="settings-label">Font</div>
          <div class="font-options">
            <button class="font-option active" onclick="setFont('Inter')" style="font-family:'Inter',sans-serif" data-font="Inter">Inter</button>
            <button class="font-option" onclick="setFont('DM Sans')" style="font-family:'DM Sans',sans-serif" data-font="DM Sans">DM Sans</button>
            <button class="font-option" onclick="setFont('Source Serif 4')" style="font-family:'Source Serif 4',serif" data-font="Source Serif 4">Source Serif 4</button>
            <button class="font-option" onclick="setFont('Libre Baskerville')" style="font-family:'Libre Baskerville',serif" data-font="Libre Baskerville">Libre Baskerville</button>
            <button class="font-option" onclick="setFont('system-ui')" style="font-family:system-ui" data-font="system-ui">System</button>
          </div>
        </div>
      </div>
      <button class="btn-logout" onclick="handleLogout()">Sign Out</button>
    </div>
  </div>

  <div class="main">
    <div class="left-col">
      <div class="left-col-content">
        <div class="alerts-bar" id="alerts-bar"></div>

        <div class="section" id="bench-section">
          <div class="section-header">
            <span class="section-title">🎯 Bench</span>
            <span class="section-count" id="bench-count">0</span>
          </div>
          <div id="bench-tasks" class="drop-zone" data-pool="bench" data-pool-label="Drop here → Bench" ondragenter="onDragEnter(event)" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event, 'bench')"></div>
        </div>

        <div class="section" id="inbox-section">
          <div class="section-header">
            <span class="section-title">📥 Inbox</span>
            <span class="section-count" id="inbox-count">0</span>
          </div>
          <div id="inbox-tasks" class="drop-zone" data-pool="inbox" data-pool-label="Drop here → Inbox" ondragenter="onDragEnter(event)" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event, 'inbox')"></div>
        </div>

        <div class="section" id="shelf-section">
          <div class="section-header collapsible-header" onclick="toggleCollapsible('shelf')">
            <span class="section-title"><span class="arrow" id="shelf-arrow">▸</span> 📦 Shelf</span>
            <span class="section-count" id="shelf-count">0</span>
          </div>
          <div class="collapsible-body" id="shelf-body">
            <div id="shelf-tasks" class="drop-zone" data-pool="shelf" data-pool-label="Drop here → Shelf" ondragenter="onDragEnter(event)" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event, 'shelf')"></div>
          </div>
        </div>

        <div class="section" id="someday-section">
          <div class="section-header collapsible-header" onclick="toggleCollapsible('someday')">
            <span class="section-title"><span class="arrow" id="someday-arrow">▸</span> 💭 Someday / Maybe</span>
            <span class="section-count" id="someday-count">0</span>
          </div>
          <div class="collapsible-body" id="someday-body">
            <div id="someday-tasks" class="drop-zone" data-pool="someday" data-pool-label="Drop here → Someday" ondragenter="onDragEnter(event)" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event, 'someday')"></div>
          </div>
        </div>

        <div class="section" id="deferred-section">
          <div class="section-header collapsible-header" onclick="toggleCollapsible('deferred')">
            <span class="section-title"><span class="arrow" id="deferred-arrow">▸</span> ⏳ Deferred</span>
            <span class="section-count" id="deferred-count">0</span>
          </div>
          <div class="collapsible-body" id="deferred-body">
            <div id="deferred-tasks" class="drop-zone" data-pool="deferred" data-pool-label="Drop here → Deferred" ondragenter="onDragEnter(event)" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event, 'deferred')"></div>
          </div>
        </div>
      </div>

      <div class="left-col-bottom">
        <div class="filter-bar">
          <select id="filter-domain" onchange="renderTasks()">
            <option value="all">All domains</option>
            <option value="work">Work</option>
            <option value="home">Home</option>
          </select>
          <select id="filter-project" onchange="renderTasks()">
            <option value="all">All projects</option>
          </select>
          <select id="filter-tag" onchange="renderTasks()">
            <option value="all">All tags</option>
          </select>
          <button class="select-toggle" id="select-toggle" onclick="toggleSelectMode()">Select</button>
        </div>
        <div class="quick-add">
          <input type="text" id="quick-add-input" placeholder="Add a task..." onkeydown="if(event.key==='Enter')handleQuickAdd()">
          <select id="quick-add-pool">
            <option value="inbox">Inbox</option>
            <option value="bench">Bench</option>
            <option value="shelf">Shelf</option>
            <option value="deferred">Deferred</option>
            <option value="someday">Someday</option>
          </select>
          <button onclick="handleQuickAdd()">Add</button>
        </div>
      </div>
    </div>

    <div class="right-col">
      <div class="right-section">
        <div class="right-section-title">📅 Agenda</div>
        <div class="agenda-scroll">
          <div id="agenda-container">
            <div class="agenda-empty">Loading calendar...</div>
          </div>
        </div>
      </div>

      <div class="right-section">
        <div class="right-section-title">🎯 Sprint Goals</div>
        <div id="goals-container">
          <div class="goal-item"><span class="goal-label">P1:</span> GFF Master Plan</div>
          <div class="goal-item"><span class="goal-label">P2:</span> Budget 26-27</div>
          <div class="goal-item"><span class="goal-label">P3:</span> Staff Evaluations</div>
        </div>
      </div>

      <div class="right-section">
        <div class="coaching-card" id="coaching-card"></div>
      </div>

      <div class="right-section">
        <div class="right-section-title">✅ Recently Completed</div>
        <div id="done-tasks"></div>
      </div>
    </div>
  </div>
</div>

<div class="batch-bar" id="batch-bar">
  <span class="batch-count" id="batch-count">0 selected</span>
  <button onclick="batchMove('bench')">→ Bench</button>
  <button onclick="batchMove('inbox')">→ Inbox</button>
  <button onclick="batchMove('shelf')">→ Shelf</button>
  <button onclick="batchMove('deferred')">→ Deferred</button>
  <button onclick="batchMove('someday')">→ Someday</button>
  <button class="batch-done" onclick="batchMove('done')">Done</button>
  <button class="batch-cancel" onclick="toggleSelectMode()">Cancel</button>
</div>

<div class="defer-modal-overlay" id="defer-modal-overlay" onclick="closeDeferModal(event)">
  <div class="defer-modal" onclick="event.stopPropagation()">
    <h3>Defer until when?</h3>
    <div class="defer-shortcuts">
      <button onclick="setDeferDate('tomorrow')">Tomorrow</button>
      <button onclick="setDeferDate('next-week')">Next Week</button>
      <button onclick="setDeferDate('next-month')">Next Month</button>
      <button onclick="setDeferDate('2-weeks')">2 Weeks</button>
    </div>
    <input type="date" id="defer-date-input" onchange="updateDeferPreview()">
    <div class="defer-actions">
      <button class="cancel-btn" onclick="closeDeferModal()">Cancel</button>
      <button class="confirm-btn" onclick="confirmDefer()">Defer</button>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://epdxkvohrclpqnlagkwv.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVwZHhrdm9ocmNscHFubGFna3d2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NTA3NDYsImV4cCI6MjA5MDMyNjc0Nn0.l9A8VlNFQw0kWgBLS0Cvo9CU6WEzHZS5OcLmBLz7CDI';

  let sb;
  try {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  } catch (e) {
    document.getElementById('login-error').textContent = 'Supabase library failed to load: ' + e.message;
  }

  console.log('Dashboard v4 loaded');

  let allTasks = [];
  let openMenu = null;
  let currentTheme = 'ember';
  let currentFont = 'Inter';

  function setTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    currentTheme = theme;
    document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelector(`.theme-btn.${theme}`)?.classList.add('active');
  }

  function setFont(font) {
    const fallback = font.includes('Serif') || font.includes('Baskerville') ? ', serif' : ', -apple-system, system-ui, sans-serif';
    document.documentElement.style.setProperty('--font', `'${font}'${fallback}`);
    currentFont = font;
    document.querySelectorAll('.font-option').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.font === font);
    });
  }

  function toggleSettings(event) {
    event.stopPropagation();
    const dropdown = document.getElementById('settings-dropdown');
    dropdown.classList.toggle('open');
  }

  document.addEventListener('click', (e) => {
    const dropdown = document.getElementById('settings-dropdown');
    if (dropdown && !e.target.closest('.settings-wrap')) {
      dropdown.classList.remove('open');
    }
  });

  async function checkAuth() {
    if (!sb) {
      document.getElementById('login-screen').style.display = 'flex';
      return;
    }
    try {
      const { data: { session } } = await sb.auth.getSession();
      if (session) {
        showDashboard();
      } else {
        document.getElementById('login-screen').style.display = 'flex';
      }
    } catch (e) {
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('login-error').textContent = 'Auth check failed: ' + e.message;
    }
  }

  async function handleLogin() {
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;
    const errorEl = document.getElementById('login-error');

    if (!sb) {
      errorEl.textContent = 'Supabase not loaded. Refresh the page.';
      return;
    }
    errorEl.textContent = 'Signing in...';

    try {
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      if (error) {
        errorEl.textContent = error.message;
      } else if (data && data.session) {
        showDashboard();
      } else {
        errorEl.textContent = 'No session returned. Check Supabase config.';
      }
    } catch (e) {
      errorEl.textContent = 'Error: ' + e.message;
    }
  }

  async function handleLogout() {
    await sb.auth.signOut();
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  }

  async function showDashboard() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';

    const now = new Date();
    const opts = { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' };
    document.getElementById('header-date').textContent = now.toLocaleDateString('en-US', opts);

    await surfaceDeferredTasks();
    await loadTasks();
    await loadAgenda();
    renderCoachingCard();
  }

  async function surfaceDeferredTasks() {
    try {
      await sb.rpc('surface_deferred_tasks');
    } catch (e) {
      console.log('Surfacing check:', e);
    }
  }

  async function loadTasks() {
    const { data, error } = await sb
      .from('tasks')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) {
      console.error('Error loading tasks:', error);
      return;
    }

    allTasks = data || [];
    populateProjectFilter();
    renderTasks();
    renderAlerts();
  }

  function populateProjectFilter() {
    const select = document.getElementById('filter-project');
    const projects = [...new Set(allTasks.filter(t => t.project).map(t => t.project))].sort();
    select.innerHTML = '<option value="all">All projects</option>';
    projects.forEach(p => {
      select.innerHTML += `<option value="${p}">${p}</option>`;
    });

    const tagSelect = document.getElementById('filter-tag');
    const tags = [...new Set(allTasks.filter(t => t.tags && t.tags.length).flatMap(t => t.tags))].sort();
    tagSelect.innerHTML = '<option value="all">All tags</option>';
    tags.forEach(tag => {
      tagSelect.innerHTML += `<option value="${tag}">${tag}</option>`;
    });
  }

  function getFilteredTasks(status) {
    const domain = document.getElementById('filter-domain').value;
    const project = document.getElementById('filter-project').value;
    const tag = document.getElementById('filter-tag').value;

    return allTasks.filter(t => {
      if (t.status !== status) return false;
      if (domain !== 'all' && t.domain !== domain) return false;
      if (project !== 'all' && t.project !== project) return false;
      if (tag !== 'all' && (!t.tags || !t.tags.includes(tag))) return false;
      return true;
    });
  }

  function renderTasks() {
    const bench = getFilteredTasks('bench');
    const inbox = getFilteredTasks('inbox');
    const shelf = getFilteredTasks('shelf');
    const someday = getFilteredTasks('someday');
    const deferred = getFilteredTasks('deferred')
      .sort((a, b) => {
        if (!a.defer_date) return 1;
        if (!b.defer_date) return -1;
        return new Date(a.defer_date) - new Date(b.defer_date);
      });
    const done = allTasks
      .filter(t => t.status === 'done' && t.completed_at)
      .sort((a, b) => new Date(b.completed_at) - new Date(a.completed_at))
      .slice(0, 5);

    document.getElementById('bench-tasks').innerHTML = bench.map(t => taskHTML(t)).join('');
    document.getElementById('inbox-tasks').innerHTML = inbox.map(t => taskHTML(t)).join('');
    document.getElementById('shelf-tasks').innerHTML = shelf.map(t => taskHTML(t)).join('');
    document.getElementById('someday-tasks').innerHTML = someday.map(t => taskHTML(t)).join('');
    document.getElementById('deferred-tasks').innerHTML = deferred.map(t => taskHTML(t)).join('');
    document.getElementById('done-tasks').innerHTML = done.map(t => taskHTML(t, true)).join('');

    document.getElementById('bench-count').textContent = bench.length;
    document.getElementById('inbox-count').textContent = inbox.length;
    document.getElementById('shelf-count').textContent = shelf.length;
    document.getElementById('someday-count').textContent = someday.length;
    document.getElementById('deferred-count').textContent = deferred.length;
  }

  function taskHTML(task, isDone = false) {
    const checked = isDone ? 'checked' : '';
    const completedClass = isDone ? 'completed' : '';
    const tags = [];

    if (task.project) tags.push(`<span class="tag project">${task.project}</span>`);
    if (task.domain === 'home') tags.push('<span class="tag home">home</span>');
    if (task.tags && task.tags.length) {
      task.tags.forEach(t => tags.push(`<span class="tag">${t}</span>`));
    }
    if (task.due_date) {
      const days = daysUntil(task.due_date);
      if (days < 0) tags.push(`<span class="tag overdue">overdue ${Math.abs(days)}d</span>`);
      else if (days <= 3) tags.push(`<span class="tag due">due in ${days}d</span>`);
      else tags.push(`<span class="tag due">due ${formatDate(task.due_date)}</span>`);
    }
    if (task.status === 'deferred' && task.defer_date) {
      const dDays = daysUntil(task.defer_date);
      if (dDays <= 0) tags.push(`<span class="tag overdue">surfaces today</span>`);
      else if (dDays === 1) tags.push(`<span class="tag">surfaces tomorrow</span>`);
      else tags.push(`<span class="tag">surfaces in ${dDays}d</span>`);
    }

    const moveOptions = isDone ? '' : `
      <div class="task-actions-wrap">
        <button class="task-action-btn" onclick="toggleMoveMenu(event, '${task.id}')">⋯</button>
        <div class="move-menu" id="menu-${task.id}" style="display:none">
          ${task.status !== 'bench' ? `<button onclick="moveTask('${task.id}','bench')">→ Bench</button>` : ''}
          ${task.status !== 'shelf' ? `<button onclick="moveTask('${task.id}','shelf')">→ Shelf</button>` : ''}
          ${task.status !== 'deferred' ? `<button onclick="moveTask('${task.id}','deferred')">→ Deferred</button>` : `<button onclick="rescheduleTask('${task.id}')">Reschedule</button>`}
          ${task.status !== 'someday' ? `<button onclick="moveTask('${task.id}','someday')">→ Someday</button>` : ''}
          <button onclick="deleteTask('${task.id}')" style="color:var(--danger)">Delete</button>
        </div>
      </div>
    `;

    const dragAttrs = isDone ? '' : `draggable="true" ondragstart="onDragStart(event, '${task.id}', '${task.status}')" ondragend="onDragEnd(event)"`;
    const dragHandle = isDone ? '' : `<div class="drag-handle" title="Drag to move" ontouchstart="onTouchDragStart(event, '${task.id}', '${task.status}')" ontouchmove="onTouchDragMove(event)" ontouchend="onTouchDragEnd(event)">⠿</div>`;

    return `
      <div class="task" data-id="${task.id}" ${dragAttrs} onclick="toggleTaskSelection(event, '${task.id}')">
        ${dragHandle}
        <div class="task-checkbox ${checked}" onclick="if(!selectMode){event.stopPropagation();toggleComplete('${task.id}', ${isDone})}"></div>
        <div class="task-content">
          <div class="task-name ${completedClass}">${escapeHTML(task.name)}</div>
          ${tags.length ? `<div class="task-meta">${tags.join('')}</div>` : ''}
        </div>
        ${moveOptions}
      </div>
    `;
  }

  function getDismissedAlerts() {
    try {
      const stored = localStorage.getItem('dismissed-alerts');
      if (!stored) return {};
      const parsed = JSON.parse(stored);
      const today = new Date().toISOString().split('T')[0];
      // Only keep dismissals from today — everything else reappears
      const filtered = {};
      for (const [key, date] of Object.entries(parsed)) {
        if (date === today) filtered[key] = date;
      }
      return filtered;
    } catch { return {}; }
  }

  function dismissAlert(key, el) {
    el.classList.add('dismissing');
    const dismissed = getDismissedAlerts();
    dismissed[key] = new Date().toISOString().split('T')[0];
    localStorage.setItem('dismissed-alerts', JSON.stringify(dismissed));
    setTimeout(() => el.remove(), 300);
  }

  function renderAlerts() {
    const bar = document.getElementById('alerts-bar');
    const alerts = [];
    const dismissed = getDismissedAlerts();

    allTasks.forEach(t => {
      if (t.status === 'done') return;
      if (t.due_date) {
        const days = daysUntil(t.due_date);
        if (days < 0) {
          alerts.push({ type: 'overdue', key: `overdue-${t.id}`, text: `Overdue: ${t.name} (${Math.abs(days)} days ago)` });
        } else if (days <= 3) {
          alerts.push({ type: 'due-soon', key: `due-${t.id}`, text: `Due ${days === 0 ? 'today' : `in ${days} day${days > 1 ? 's' : ''}`}: ${t.name}` });
        }
      }
      if (t.status === 'shelf' && t.defer_date) {
        const deferDays = daysUntil(t.defer_date);
        if (deferDays >= -1 && deferDays <= 7) {
          alerts.push({ type: 'surfaced', key: `deferred-${t.id}`, text: deferDays > 0
            ? `${t.name} begins in ${deferDays} day${deferDays > 1 ? 's' : ''}`
            : `${t.name} starts today. Move to bench?` });
        }
      }
    });

    const visible = alerts.filter(a => !dismissed[a.key]);

    bar.innerHTML = visible.map(a =>
      `<div class="alert alert-${a.type}">
        <span>${a.type === 'overdue' ? '🔴' : a.type === 'due-soon' ? '🟡' : '🔵'} ${escapeHTML(a.text)}</span>
        <button class="alert-dismiss" onclick="dismissAlert('${a.key}', this.closest('.alert'))" title="Dismiss for today">✕</button>
      </div>`
    ).join('');
  }

  async function toggleComplete(id, wasDone) {
    const newStatus = wasDone ? 'shelf' : 'done';
    const { error } = await sb
      .from('tasks')
      .update({ status: newStatus })
      .eq('id', id);

    if (!error) await loadTasks();
  }

  let pendingDeferTaskId = null;
  let selectMode = false;
  let selectedTaskIds = new Set();
  let pendingBatchDefer = false;

  async function moveTask(id, newStatus) {
    closeAllMenus();
    if (newStatus === 'deferred') {
      pendingDeferTaskId = id;
      showDeferModal();
      return;
    }
    const update = { status: newStatus };
    if (newStatus !== 'deferred') update.defer_date = null;
    const { error } = await sb
      .from('tasks')
      .update(update)
      .eq('id', id);

    if (!error) await loadTasks();
  }

  function showDeferModal() {
    const modal = document.getElementById('defer-modal-overlay');
    const input = document.getElementById('defer-date-input');
    const tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate() + 1);
    input.value = tomorrow.toISOString().split('T')[0];
    input.min = new Date().toISOString().split('T')[0];
    modal.classList.add('active');
  }

  function closeDeferModal(event) {
    if (event && event.target !== event.currentTarget) return;
    document.getElementById('defer-modal-overlay').classList.remove('active');
    pendingDeferTaskId = null;
    pendingBatchDefer = false;
  }

  function setDeferDate(shortcut) {
    const input = document.getElementById('defer-date-input');
    const d = new Date();
    switch (shortcut) {
      case 'tomorrow': d.setDate(d.getDate() + 1); break;
      case 'next-week': d.setDate(d.getDate() + (8 - d.getDay()) % 7 || 7); break;
      case '2-weeks': d.setDate(d.getDate() + 14); break;
      case 'next-month': d.setMonth(d.getMonth() + 1); d.setDate(1); break;
    }
    input.value = d.toISOString().split('T')[0];
  }

  function rescheduleTask(id) {
    closeAllMenus();
    pendingDeferTaskId = id;
    const task = allTasks.find(t => t.id === id);
    const modal = document.getElementById('defer-modal-overlay');
    const input = document.getElementById('defer-date-input');
    if (task && task.defer_date) {
      input.value = task.defer_date;
    } else {
      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      input.value = tomorrow.toISOString().split('T')[0];
    }
    input.min = new Date().toISOString().split('T')[0];
    modal.classList.add('active');
  }

  async function confirmDefer() {
    const deferDate = document.getElementById('defer-date-input').value;
    if (!deferDate) return;

    // Batch defer mode
    if (pendingDeferTaskId === '__batch__' && selectedTaskIds.size > 0) {
      const ids = [...selectedTaskIds];
      const { error } = await sb
        .from('tasks')
        .update({ status: 'deferred', defer_date: deferDate })
        .in('id', ids);

      document.getElementById('defer-modal-overlay').classList.remove('active');
      pendingDeferTaskId = null;
      pendingBatchDefer = false;
      if (!error) {
        toggleSelectMode();
        await loadTasks();
      }
      return;
    }

    // Single task defer
    if (!pendingDeferTaskId) return;
    const { error } = await sb
      .from('tasks')
      .update({ status: 'deferred', defer_date: deferDate })
      .eq('id', pendingDeferTaskId);

    document.getElementById('defer-modal-overlay').classList.remove('active');
    pendingDeferTaskId = null;
    if (!error) await loadTasks();
  }

  // — Multi-select / Batch mode —
  function toggleSelectMode() {
    selectMode = !selectMode;
    selectedTaskIds.clear();
    pendingBatchDefer = false;
    document.body.classList.toggle('select-mode', selectMode);
    document.getElementById('select-toggle').classList.toggle('active', selectMode);
    document.getElementById('select-toggle').textContent = selectMode ? 'Selecting...' : 'Select';
    updateBatchBar();
    // Remove all selected highlights
    document.querySelectorAll('.task.selected').forEach(el => el.classList.remove('selected'));
  }

  function toggleTaskSelection(event, id) {
    if (!selectMode) return;
    event.stopPropagation();
    const taskEl = event.currentTarget;
    if (selectedTaskIds.has(id)) {
      selectedTaskIds.delete(id);
      taskEl.classList.remove('selected');
    } else {
      selectedTaskIds.add(id);
      taskEl.classList.add('selected');
    }
    updateBatchBar();
  }

  function updateBatchBar() {
    const bar = document.getElementById('batch-bar');
    const count = document.getElementById('batch-count');
    if (selectMode && selectedTaskIds.size > 0) {
      bar.classList.add('active');
      count.textContent = `${selectedTaskIds.size} selected`;
    } else {
      bar.classList.remove('active');
    }
  }

  async function batchMove(targetStatus) {
    if (selectedTaskIds.size === 0) return;

    if (targetStatus === 'deferred') {
      pendingBatchDefer = true;
      pendingDeferTaskId = '__batch__';
      showDeferModal();
      return;
    }

    const ids = [...selectedTaskIds];
    const update = { status: targetStatus };
    if (targetStatus === 'done') update.completed_at = new Date().toISOString();

    const { error } = await sb
      .from('tasks')
      .update(update)
      .in('id', ids);

    if (!error) {
      toggleSelectMode();
      await loadTasks();
    }
  }

  async function deleteTask(id) {
    closeAllMenus();
    if (!confirm('Delete this task?')) return;
    const { error } = await sb
      .from('tasks')
      .delete()
      .eq('id', id);

    if (!error) await loadTasks();
  }

  async function handleQuickAdd() {
    const input = document.getElementById('quick-add-input');
    const pool = document.getElementById('quick-add-pool').value;
    const name = input.value.trim();
    if (!name) return;

    const { error } = await sb
      .from('tasks')
      .insert({
        name: name,
        status: pool,
        domain: 'work',
        capture_notes: name
      });

    if (!error) {
      input.value = '';
      await loadTasks();
    }
  }

  function toggleCollapsible(id) {
    const body = document.getElementById(`${id}-body`);
    const arrow = document.getElementById(`${id}-arrow`);
    const header = arrow.closest('.collapsible-header');
    body.classList.toggle('open');
    header.classList.toggle('open');
  }

  function toggleMoveMenu(event, id) {
    event.stopPropagation();
    const menu = document.getElementById(`menu-${id}`);
    const wasOpen = menu.style.display === 'block';
    closeAllMenus();
    if (!wasOpen) menu.style.display = 'block';
  }

  function closeAllMenus() {
    document.querySelectorAll('.move-menu').forEach(m => m.style.display = 'none');
  }

  document.addEventListener('click', closeAllMenus);

  // — Drag and Drop (Safari-compatible + touch support) —
  let draggedTaskId = null;
  let draggedFromPool = null;
  const dragEnterCounters = new Map(); // counter per drop zone to fix Safari flicker

  function onDragStart(event, taskId, fromPool) {
    draggedTaskId = taskId;
    draggedFromPool = fromPool;
    event.dataTransfer.effectAllowed = 'move';
    event.dataTransfer.setData('text/plain', taskId);
    // Reset all counters
    dragEnterCounters.clear();
    // Delay so the dragging class doesn't flash before ghost image forms
    requestAnimationFrame(() => {
      event.target.closest('.task').classList.add('dragging');
    });
    // Expand collapsed sections so they can receive drops
    document.querySelectorAll('.collapsible-body').forEach(body => {
      body.classList.add('open');
      const section = body.closest('.section');
      const header = section.querySelector('.collapsible-header');
      if (header) header.classList.add('open');
    });
  }

  function onDragEnd(event) {
    event.target.closest('.task')?.classList.remove('dragging');
    document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('drag-over'));
    dragEnterCounters.clear();
    draggedTaskId = null;
    draggedFromPool = null;
  }

  function onDragEnter(event) {
    event.preventDefault();
    const zone = event.currentTarget;
    const pool = zone.dataset.pool;
    const count = (dragEnterCounters.get(pool) || 0) + 1;
    dragEnterCounters.set(pool, count);
    if (pool !== draggedFromPool) {
      zone.classList.add('drag-over');
    }
  }

  function onDragOver(event) {
    event.preventDefault();
    event.dataTransfer.dropEffect = 'move';
  }

  function onDragLeave(event) {
    const zone = event.currentTarget;
    const pool = zone.dataset.pool;
    const count = (dragEnterCounters.get(pool) || 1) - 1;
    dragEnterCounters.set(pool, count);
    // Only remove highlight when we've truly left (counter back to 0)
    if (count <= 0) {
      zone.classList.remove('drag-over');
      dragEnterCounters.set(pool, 0);
    }
  }

  async function onDrop(event, targetPool) {
    event.preventDefault();
    event.stopPropagation();
    const zone = event.currentTarget;
    zone.classList.remove('drag-over');
    dragEnterCounters.set(targetPool, 0);

    if (!draggedTaskId || targetPool === draggedFromPool) return;

    await moveTask(draggedTaskId, targetPool);
    draggedTaskId = null;
    draggedFromPool = null;
  }

  // — Touch drag support (iOS Safari) —
  let touchDragEl = null;
  let touchClone = null;
  let touchStartY = 0;
  let touchMoved = false;

  function onTouchDragStart(event, taskId, fromPool) {
    const touch = event.touches[0];
    touchStartY = touch.clientY;
    touchMoved = false;
    touchDragEl = event.target.closest('.task');
    draggedTaskId = taskId;
    draggedFromPool = fromPool;

    // Long press detection — 300ms
    touchDragEl._touchTimer = setTimeout(() => {
      touchMoved = true;
      touchDragEl.classList.add('dragging');
      // Create a floating clone
      touchClone = touchDragEl.cloneNode(true);
      touchClone.style.cssText = `position:fixed;top:${touch.clientY - 20}px;left:${touch.clientX - 20}px;width:${touchDragEl.offsetWidth}px;opacity:0.85;z-index:9999;pointer-events:none;transform:rotate(2deg);box-shadow:0 8px 24px rgba(0,0,0,0.3);`;
      document.body.appendChild(touchClone);
      // Expand collapsed sections
      document.querySelectorAll('.collapsible-body').forEach(body => {
        body.classList.add('open');
        const section = body.closest('.section');
        const header = section.querySelector('.collapsible-header');
        if (header) header.classList.add('open');
      });
    }, 300);
  }

  function onTouchDragMove(event) {
    if (!touchMoved || !touchClone) {
      // Check if finger moved enough to cancel (if not yet in drag mode)
      if (!touchMoved && touchDragEl) {
        const touch = event.touches[0];
        if (Math.abs(touch.clientY - touchStartY) > 10) {
          clearTimeout(touchDragEl._touchTimer);
          cleanupTouch();
        }
      }
      return;
    }
    event.preventDefault();
    const touch = event.touches[0];
    touchClone.style.top = (touch.clientY - 20) + 'px';
    touchClone.style.left = (touch.clientX - 20) + 'px';

    // Highlight drop zone under finger
    document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('drag-over'));
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    if (el) {
      const zone = el.closest('.drop-zone');
      if (zone && zone.dataset.pool !== draggedFromPool) {
        zone.classList.add('drag-over');
      }
    }
  }

  async function onTouchDragEnd(event) {
    if (touchDragEl) clearTimeout(touchDragEl._touchTimer);
    if (!touchMoved || !touchClone) { cleanupTouch(); return; }

    const touch = event.changedTouches[0];
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    const zone = el?.closest('.drop-zone');

    document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('drag-over'));

    if (zone && zone.dataset.pool !== draggedFromPool && draggedTaskId) {
      await moveTask(draggedTaskId, zone.dataset.pool);
    }

    cleanupTouch();
  }

  function cleanupTouch() {
    if (touchClone) { touchClone.remove(); touchClone = null; }
    if (touchDragEl) { touchDragEl.classList.remove('dragging'); touchDragEl = null; }
    draggedTaskId = null;
    draggedFromPool = null;
    touchMoved = false;
  }

  function daysUntil(dateStr) {
    const target = new Date(dateStr + 'T00:00:00');
    const now = new Date();
    now.setHours(0, 0, 0, 0);
    return Math.floor((target - now) / (1000 * 60 * 60 * 24));
  }

  function formatDate(dateStr) {
    return new Date(dateStr + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  function escapeHTML(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  async function loadAgenda() {
    const container = document.getElementById('agenda-container');
    const now = new Date();
    const todayStr = now.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });

    const tomorrow = new Date(now);
    tomorrow.setDate(tomorrow.getDate() + 1);
    const tomorrowStr = tomorrow.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });

    const startOfToday = new Date(now);
    startOfToday.setHours(0, 0, 0, 0);
    const endOfTomorrow = new Date(tomorrow);
    endOfTomorrow.setHours(23, 59, 59, 999);

    const { data: events, error } = await sb
      .from('calendar_events')
      .select('*')
      .gte('start_time', startOfToday.toISOString())
      .lte('start_time', endOfTomorrow.toISOString())
      .neq('status', 'cancelled')
      .order('start_time', { ascending: true });

    if (error) {
      console.log('Agenda load:', error);
      container.innerHTML = '<div class="agenda-empty">Calendar not synced yet</div>';
      return;
    }

    if (!events || events.length === 0) {
      container.innerHTML = '<div class="agenda-empty">No events synced yet — run calendar sync to populate</div>';
      return;
    }

    const tomorrowStart = new Date(tomorrow);
    tomorrowStart.setHours(0, 0, 0, 0);
    const tomorrowStartMs = tomorrowStart.getTime();

    const todayEvents = events.filter(e => new Date(e.start_time).getTime() < tomorrowStartMs);
    const tomorrowEvents = events.filter(e => new Date(e.start_time).getTime() >= tomorrowStartMs);

    let html = '';

    html += `<div class="agenda-day-label">Today — ${todayStr}</div>`;

    if (todayEvents.length > 0) {
      let nowMarkerInserted = false;

      todayEvents.forEach((e, i) => {
        const evStart = new Date(e.start_time);
        const evEnd = new Date(e.end_time);
        const status = getEventTimeStatus(evStart, evEnd, now);

        if (!nowMarkerInserted && (status === 'current' || status === 'upcoming')) {
          html += nowMarkerHTML(now);
          nowMarkerInserted = true;
        }

        html += agendaEventHTML(e, status);
      });

      if (!nowMarkerInserted) {
        html += nowMarkerHTML(now);
      }
    } else {
      html += '<div class="agenda-empty">Clear day</div>';
    }

    if (tomorrowEvents.length > 0) {
      html += `<div class="agenda-day-label">Tomorrow — ${tomorrowStr}</div>`;
      html += tomorrowEvents.map(e => agendaEventHTML(e, 'upcoming')).join('');
    }

    container.innerHTML = html;

    setTimeout(() => {
      const marker = container.querySelector('.agenda-now-marker');
      if (marker) {
        marker.scrollIntoView({ block: 'center', behavior: 'smooth' });
      }
    }, 100);
  }

  function getEventTimeStatus(start, end, now) {
    if (now >= end) return 'past';
    if (now >= start && now < end) return 'current';
    return 'upcoming';
  }

  function nowMarkerHTML(now) {
    const timeStr = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true }).toLowerCase();
    return `
      <div class="agenda-now-marker">
        <span class="agenda-now-time">${timeStr}</span>
      </div>
    `;
  }

  function agendaEventHTML(event, status) {
    const start = new Date(event.start_time);
    let timeStr;

    if (event.all_day) {
      timeStr = 'all day';
    } else {
      timeStr = start.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true }).toLowerCase();
    }

    const dotColor = event.color || '#c4956a';
    const locationHtml = event.location
      ? `<div class="event-location">${escapeHTML(event.location)}</div>`
      : '';

    return `
      <div class="agenda-event ${status}">
        <span class="agenda-time">${timeStr}</span>
        <span class="agenda-dot" style="background:${dotColor}"></span>
        <div class="agenda-summary">
          <div class="event-title">${escapeHTML(event.summary)}</div>
          ${locationHtml}
        </div>
      </div>
    `;
  }

  setInterval(() => { loadAgenda(); }, 5 * 60 * 1000);
